<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1324"/>
      <stop offset="100%" stop-color="#2f1f44"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg4)"/>
  <rect x="100" y="110" width="1400" height="680" rx="16" fill="#241637" stroke="#614286"/>
  <g font-family="Consolas, monospace" font-size="24">
    <text x="160" y="200" fill="#f3b6ff">SELECT</text>
    <text x="270" y="200" fill="#d8e4ff">project_name, status, performance_score</text>
    <text x="160" y="250" fill="#f3b6ff">FROM</text>
    <text x="230" y="250" fill="#b8ffd9">delivery_dashboard</text>
    <text x="160" y="300" fill="#f3b6ff">WHERE</text>
    <text x="250" y="300" fill="#d8e4ff">client = 'Kachehub'</text>
    <text x="160" y="350" fill="#f3b6ff">ORDER BY</text>
    <text x="290" y="350" fill="#d8e4ff">go_live_date DESC;</text>
    <text x="160" y="450" fill="#b8ffd9">[OK] CI pipeline passed</text>
    <text x="160" y="500" fill="#b8ffd9">[OK] Security checks passed</text>
    <text x="160" y="550" fill="#b8ffd9">[OK] Production deploy complete</text>
  </g>
</svg>
