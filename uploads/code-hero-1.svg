<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1a24"/>
      <stop offset="100%" stop-color="#132c3a"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="120" y="120" width="1360" height="660" rx="20" fill="#0f2430" stroke="#2a4b5f"/>
  <g font-family="Consolas, monospace" font-size="26" fill="#8fd3ff">
    <text x="170" y="200">const service = {</text>
    <text x="170" y="250">  name: "Kachehub",</text>
    <text x="170" y="300">  type: "System Development",</text>
    <text x="170" y="350">  stack: ["Web", "Mobile", "Cloud"],</text>
    <text x="170" y="400">  support: true</text>
    <text x="170" y="450">};</text>
    <text x="170" y="520">function buildSolution(client) {</text>
    <text x="170" y="570">  return deploy(scale(design(client.requirements)));</text>
    <text x="170" y="620">}</text>
